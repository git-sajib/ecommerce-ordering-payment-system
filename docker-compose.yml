services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ecommerce-app
        restart: unless-stopped
        working_dir: /var/www

        volumes:
            - ./:/var/www

        environment:
            APP_ENV: local
            APP_DEBUG: "true"

        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started

        networks:
            - ecommerce

    nginx:
        image: nginx:1.28-alpine
        container_name: ecommerce-nginx
        restart: unless-stopped

        ports:
            - "8000:80"

        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

        depends_on:
            - app

        networks:
            - ecommerce

    mysql:
        image: mysql:8.4
        container_name: ecommerce-mysql
        restart: unless-stopped

        environment:
            MYSQL_ROOT_PASSWORD: Root@12345
            MYSQL_DATABASE: ecommerce_backend
            MYSQL_USER: laravel
            MYSQL_PASSWORD: password

        ports:
            - "3307:3306"

        volumes:
            - mysql-data:/var/lib/mysql

        healthcheck:
            test:
                ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoot@12345"]
            interval: 10s
            timeout: 5s
            retries: 5

        networks:
            - ecommerce

    redis:
        image: redis:7-alpine
        container_name: ecommerce-redis
        restart: unless-stopped

        ports:
            - "6379:6379"

        networks:
            - ecommerce

volumes:
    mysql-data:

networks:
    ecommerce:
        driver: bridge
